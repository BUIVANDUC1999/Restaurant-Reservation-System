spring:
  application:
    name: restaurant-reservation
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/restaurant}
    username: ${DB_USERNAME:restaurant}
    password: ${DB_PASSWORD:restaurant}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
server:
  port: ${PORT:8080}
management:
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info
springdoc:
  swagger-ui:
    path: /swagger-ui.html
app:
  jwt:
    secret: ${JWT_SECRET:restaurant-reservation-demo-secret-key-change-in-production-2026}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  paypal:
    base-url: ${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
    client-id: ${PAYPAL_CLIENT_ID:}
    client-secret: ${PAYPAL_CLIENT_SECRET:}
    currency: ${PAYPAL_CURRENCY:USD}
    vnd-per-usd: ${PAYPAL_VND_PER_USD:25000}
  deposit:
    qr:
      bank-id: ${QR_BANK_ID:}
      account-no: ${QR_ACCOUNT_NO:}
      account-name: ${QR_ACCOUNT_NAME:}
  notifications:
    email-enabled: ${EMAIL_NOTIFICATIONS_ENABLED:false}
    sms-sandbox: ${SMS_SANDBOX:true}
  timeouts:
    reservation-hold-minutes: ${RESERVATION_HOLD_MINUTES:10}
    cleaning-buffer-minutes: ${CLEANING_BUFFER_MINUTES:15}
    upcoming-alert-minutes: ${UPCOMING_ALERT_MINUTES:30}
    late-warning-minutes: ${LATE_WARNING_MINUTES:15}
    late-critical-minutes: ${LATE_CRITICAL_MINUTES:20}
    table-request-ack-minutes: ${TABLE_REQUEST_ACK_MINUTES:3}
    kitchen-critical-overdue-minutes: ${KITCHEN_CRITICAL_OVERDUE_MINUTES:10}
    cleaning-target-minutes: ${CLEANING_TARGET_MINUTES:15}
    monitor-delay-ms: ${TIMEOUT_MONITOR_DELAY_MS:60000}
