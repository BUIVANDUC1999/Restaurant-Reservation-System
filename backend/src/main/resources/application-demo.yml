spring:
  datasource:
    url: jdbc:h2:mem:restaurant;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      data-locations: classpath:data-demo.sql

